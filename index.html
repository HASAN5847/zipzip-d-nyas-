<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZıpZıp Dünyası - FPS Sonsuz Şehir</title>
    <style>
        html, body { 
            margin: 0; 
            overflow: hidden; 
            background: #000; /* Daha karanlık arka plan ışıkları patlatır */
            font-family: sans-serif; 
            color: #fff; 
            user-select: none; 
            touch-action: none; 
            width: 100%;
            height: 100%;
        }
        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        #startScreen h1 { font-size: 75px; font-weight: 900; color: #2ed573; margin: 0; text-shadow: 0 0 25px rgba(46,213,115,0.9); letter-spacing: 5px; }
        #startScreen p { font-size: 20px; color: #a4b0be; letter-spacing: 2px; margin-top: 10px; margin-bottom: 30px; }
        .btn { padding: 18px 50px; font-size: 24px; background: #ff4757; border: none; color: white; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 25px rgba(255,71,87,0.7); }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 5; background: rgba(0,0,0,0.7); padding: 10px 30px; border-radius: 20px; pointer-events: none; display: none; border: 2px solid #2ed573; }
        .stat { font-size: 24px; font-weight: bold; letter-spacing: 1px; color: #2ed573; text-shadow: 0 0 10px rgba(46,213,115,0.5); }
        
        #joystickZone { position: absolute; bottom: 30px; left: 30px; width: 170px; height: 170px; background: rgba(255,255,255,0.1); border: 3px solid rgba(255,255,255,0.4); border-radius: 50%; z-index: 8; display: none; touch-action: none; }
        #joystick { position: absolute; width: 70px; height: 70px; background: rgba(255,255,255,0.7); border-radius: 50%; top: 50px; left: 50px; }
        #jumpBtn { position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; background: rgba(46,213,115,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 24px; z-index: 8; box-shadow: 0 6px 20px rgba(46,213,115,0.7); display: none; touch-action: none; -webkit-user-select: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <h1>ZIPZIP DÜNYASI</h1>
        <p>SONSUZ ŞEHİR MODU (AYDINLIK)</p>
        <button class="btn" onclick="startGame()">ŞEHRE GİR</button>
    </div>
    <div id="ui"><div class="stat">SKOR: <span id="score">0</span></div></div>
    <div id="joystickZone"><div id="joystick"></div></div>
    <div id="jumpBtn">ZIPLA</div>

    <script>
        let scene, camera, renderer, player, moveJoystick = {x:0, y:0}, yVelocity = 0;
        let blocks = [], score = 0, lastSpawnZ = 0;
        const gravity = -0.011; 
        const jumpForce = 0.28; // Havada zıplama için biraz daha güçlü
        let joyStartX = 0, joyStartY = 0, joyActive = false;
        
        let menuCubes = [], gameStarted = false;
        let menuScene, menuCamera;

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function initMenuAnimation() {
            menuScene = new THREE.Scene();
            menuCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            menuCamera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 5, 10);
            menuScene.add(light);
            menuScene.add(new THREE.AmbientLight(0x112211));

            animateMenu();
        }

        function spawnMenuCube() {
            if (gameStarted || menuCubes.length > 25) return;
            const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const mat = new THREE.MeshPhongMaterial({ color: 0x2ed573, emissive: 0x10b981, shininess: 100 });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set((Math.random() - 0.5) * 20, -8, (Math.random() - 0.5) * 10);
            cube.speedY = 0.08 + Math.random() * 0.06;
            cube.rotSpeed = (Math.random() - 0.5) * 0.05;
            cube.trails = [];
            menuScene.add(cube);
            menuCubes.push(cube);
        }

        function animateMenu() {
            if (gameStarted) return;
            requestAnimationFrame(animateMenu);

            if (Math.random() < 0.1) spawnMenuCube();

            for (let i = menuCubes.length - 1; i >= 0; i--) {
                let c = menuCubes[i];
                c.position.y += c.speedY;
                c.rotation.x += c.rotSpeed;
                c.rotation.y += c.rotSpeed;

                if (Math.random() < 0.4) {
                    const trailGeo = new THREE.BoxGeometry(c.scale.x * 0.5, c.scale.y * 0.5, c.scale.z * 0.5);
                    const trailMat = new THREE.MeshBasicMaterial({ color: 0x2ed573, transparent: true, opacity: 0.3 });
                    const tMesh = new THREE.Mesh(trailGeo, trailMat);
                    tMesh.position.copy(c.position);
                    menuScene.add(tMesh);
                    c.trails.push(tMesh);
                }

                for (let j = c.trails.length - 1; j >= 0; j--) {
                    let t = c.trails[j];
                    t.scale.multiplyScalar(0.92);
                    t.material.opacity -= 0.02;
                    if (t.material.opacity <= 0) {
                        menuScene.remove(t);
                        c.trails.splice(j, 1);
                    }
                }

                if (c.position.y > 10) {
                    c.trails.forEach(t => menuScene.remove(t));
                    menuScene.remove(c);
                    menuCubes.splice(i, 1);
                }
            }
            renderer.render(menuScene, menuCamera);
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0e17); // Hafif mavi-siyah gökyüzü
            scene.fog = new THREE.FogExp2(0x0a0e17, 0.015); // Sis azaltıldı

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

            // Daha güçlü ve yaygın ana ışık
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.8);
            sunLight.position.set(50, 100, 50);
            scene.add(sunLight);
            
            // Şehri aydınlatan ortam ışığı
            const ambientLight = new THREE.AmbientLight(0x404040, 1.2); 
            scene.add(ambientLight);

            // Binaları alttan aydınlatan hafif mavi ışık
            const groundLight = new THREE.HemisphereLight(0x333366, 0x000000, 0.8);
            scene.add(groundLight);

            player = new THREE.Group();
            player.position.set(0, 15, 0); // Başlangıç yüksekliği
            scene.add(player);
            player.add(camera);

            // Başlangıç caddesi (daha aydınlık renkler)
            createBuilding(0, 0, 0, 12, 25, 30, 0x404b5a, true); // Zemin aydınlatıldı
            lastSpawnZ = -15;

            // İlk binaları üret
            for(let i=0; i<20; i++) {
                generateNextBuildings();
            }

            setupControls();
            animateGame();
        }

        function createBuilding(x, y, z, w, h, d, color, isBase = false) {
            const geo = new THREE.BoxGeometry(w, h, d);
            // Daha parlak ve yansımalı materyal
            const mat = new THREE.MeshPhongMaterial({ 
                color: color, 
                shininess: 30,
                flatShading: false, // Daha yumuşak gölgeler
                emissive: isBase ? 0x111122 : 0x000000 // Başlangıç platformu hafif parlar
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);

            // Aydınlık pencereler (Neon Şehir Havası)
            const windowGeo = new THREE.BoxGeometry(0.5, 0.8, 0.1); // Pencere boyutu
            
            // Rastgele neon renkler
            const neonColors = [0x2ed573, 0xff4757, 0x3498db, 0xf1c40f, 0xe056fd];
            
            // Binanın yan yüzeylerine pencereler ekle
            for(let pz = z - d/2 + 2; pz < z + d/2 - 2; pz += 3) {
                for(let py = y - h/2 + 5; py < y + h/2 - 3; py += 4) {
                    if(Math.random() > 0.3) {
                        const winColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                        const windowMat = new THREE.MeshBasicMaterial({ 
                            color: winColor,
                            transparent: true,
                            opacity: 0.9
                        });
                        
                        // Sağ yüzey
                        const winRight = new THREE.Mesh(windowGeo, windowMat);
                        winRight.position.set(x + w/2 + 0.06, py, pz);
                        winRight.rotation.y = Math.PI / 2;
                        scene.add(winRight);
                        mesh.add(winRight);

                        // Sol yüzey
                        const winLeft = new THREE.Mesh(windowGeo, windowMat);
                        winLeft.position.set(x - w/2 - 0.06, py, pz);
                        winLeft.rotation.y = -Math.PI / 2;
                        scene.add(winLeft);
                        mesh.add(winLeft);
                    }
                }
            }

            // Kapılar (Zemine yakın binalar için)
            if (py < y - h/2 + 6 && Math.random() > 0.5) {
                const doorGeo = new THREE.BoxGeometry(2, 3.5, 0.1);
                const doorMat = new THREE.MeshBasicMaterial({ color: 0xffffff, emissive: 0xffffff });
                const door = new THREE.Mesh(doorGeo, doorMat);
                door.position.set(x, y - h/2 + 1.75, z + d/2 + 0.06); // Ön yüzey
                scene.add(door);
                mesh.add(door);
            }

            mesh.topY = y + h/2;
            mesh.w = w;
            mesh.d = d;
        }

        function generateNextBuildings() {
            let zPos = lastSpawnZ - 20;
            let w = 8 + Math.random() * 5;
            let h = 30 + Math.random() * 35; // Daha yüksek binalar
            let d = 10 + Math.random() * 8;
            let xPos = (Math.random() - 0.5) * 16; // Daha geniş yayılım
            
            // Daha aydınlık bina renk tonları
            const buildingColors = [0x57606f, 0x747d8c, 0x4b6584, 0xa5b1c2];
            let color = buildingColors[Math.floor(Math.random() * buildingColors.length)];

            createBuilding(xPos, h/2 - 5, zPos, w, h, d, color);
            
            // Yeşil platformlar daha sık ve aydınlık
            if(Math.random() > 0.3) {
                const platColor = new THREE.Color(0x2ed573).multiplyScalar(1.5); // Daha parlak yeşil
                createBuilding((Math.random() - 0.5) * 8, 10, zPos - 5, 5, 20, 5, platColor.getHex());
            }

            lastSpawnZ = zPos;
        }

        function setupControls() {
            const jZone = document.getElementById('joystickZone');
            const joy = document.getElementById('joystick');

            jZone.addEventListener('touchstart', e => {
                e.preventDefault();
                joyActive = true;
                joyStartX = e.touches[0].clientX;
                joyStartY = e.touches[0].clientY;
            }, { passive: false });

            jZone.addEventListener('touchmove', e => {
                e.preventDefault();
                if(!joyActive) return;
                let dx = e.touches[0].clientX - joyStartX;
                let dy = e.touches[0].clientY - joyStartY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                let angle = Math.atan2(dy, dx);
                
                let mx = Math.cos(angle) * dist;
                let my = Math.sin(angle) * dist;
                
                joy.style.transform = `translate(${mx}px, ${my}px)`;
                moveJoystick.x = mx / 50;
                moveJoystick.y = my / 50;
            }, { passive: false });

            jZone.addEventListener('touchend', e => {
                e.preventDefault();
                joyActive = false;
                joy.style.transform = 'translate(0px, 0px)';
                moveJoystick = {x:0, y:0};
            });

            // GÜNCELLENMİŞ ZIPLAMA BUTONU (Sürekli Zıplama)
            const jBtn = document.getElementById('jumpBtn');
            jBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                // isJumping kontrolü kaldırıldı -> Her dokunuşta zıplar
                yVelocity = jumpForce; 
            }, { passive: false });

            let touchStartX = 0, touchStartY = 0;
            window.addEventListener('touchstart', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                let dx = e.touches[0].clientX - touchStartX;
                let dy = e.touches[0].clientY - touchStartY;
                player.rotation.y -= dx * 0.005;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
        }

        function animateGame() {
            if (!gameStarted) return;
            requestAnimationFrame(animateGame);

            player.translateZ(moveJoystick.y * 0.18); // Hareket hızı biraz artırıldı
            player.translateX(moveJoystick.x * 0.18);

            yVelocity += gravity;
            player.position.y += yVelocity;

            blocks.forEach(b => {
                if(Math.abs(player.position.x - b.position.x) < (b.w/2 + 0.5) && 
                   Math.abs(player.position.z - b.position.z) < (b.d/2 + 0.5) && 
                   player.position.y - 1.6 <= b.topY + 0.2 && 
                   player.position.y - 1.6 > b.topY - 1.0 && yVelocity <= 0) { // Çarpışma toleransı artırıldı
                    player.position.y = b.topY + 1.6;
                    yVelocity = 0;
                    
                    if(b.scoreCounted === undefined && b.position.z !== 0) {
                        b.scoreCounted = true;
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            if (player.position.z < lastSpawnZ + 180) {
                generateNextBuildings();
            }

            // Düştüğünde sıfırlanma yüksekliği ayarlandı
            if(player.position.y < -10) {
                player.position.set(0, 15, 0); // Başlangıç pozisyonuna dön
                yVelocity = 0;
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            gameStarted = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('joystickZone').style.display = 'block';
            document.getElementById('jumpBtn').style.display = 'flex';
            
            menuCubes.forEach(c => menuScene.remove(c));
            menuCubes = [];
            
            initGame();
        }

        window.onload = initMenuAnimation;
    </script>
</body>
</html>
