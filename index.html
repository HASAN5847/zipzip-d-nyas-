<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZıpZıp Dünyası - FPS Modu</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0f19; font-family: sans-serif; color: #fff; user-select: none; }
        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(11,15,25,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        #startScreen h1 { font-size: 75px; font-weight: 900; color: #2ed573; margin: 0; text-shadow: 0 0 25px rgba(46,213,115,0.7); letter-spacing: 5px; }
        #startScreen p { font-size: 20px; color: #a4b0be; letter-spacing: 2px; margin-top: 10px; margin-bottom: 30px; }
        .btn { padding: 18px 50px; font-size: 24px; background: #ff4757; border: none; color: white; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 25px rgba(255,71,87,0.5); transition: 0.2s; }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 20px; pointer-events: none; display: none; }
        .stat { font-size: 24px; font-weight: bold; }
        #joystickZone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 5; display: none; }
        #joystick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; top: 35px; left: 35px; }
        #jumpBtn { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(255,71,87,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.3); pointer-events: auto; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <h1>ZIPZIP DÜNYASI</h1>
        <p>FPS MODU - TELEFON İÇİN</p>
        <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
    </div>
    <div id="ui"><div class="stat">SKOR: <span id="score">0</span></div></div>
    <div id="joystickZone"><div id="joystick"></div></div>
    <div id="jumpBtn">ZIPLA</div>

    <script>
        let scene, camera, renderer, player, moveJoystick = {x:0, y:0}, isJumping = false, yVelocity = 0;
        let blocks = [], score = 0;
        const gravity = -0.01, jumpForce = 0.22;
        let joyStartX = 0, joyStartY = 0, joyActive = false;
        
        let menuCubes = [], gameStarted = false;
        let menuScene, menuCamera;

        function initMenuAnimation() {
            menuScene = new THREE.Scene();
            menuCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            menuCamera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 5, 10);
            menuScene.add(light);
            menuScene.add(new THREE.AmbientLight(0x112211));

            animateMenu();
        }

        function spawnMenuCube() {
            if (gameStarted || menuCubes.length > 25) return;
            
            const geo = new THREE.BoxGeometry(0.6, 0.6, 0.6);
            const mat = new THREE.MeshPhongMaterial({ color: 0x2ed573, emissive: 0x10b981, shininess: 100 });
            const cube = new THREE.Mesh(geo, mat);
            
            cube.position.set((Math.random() - 0.5) * 20, -8, (Math.random() - 0.5) * 10);
            cube.speedY = 0.08 + Math.random() * 0.06;
            cube.rotSpeed = (Math.random() - 0.5) * 0.05;
            
            cube.trails = [];
            cube.maxTrails = 8;

            menuScene.add(cube);
            menuCubes.push(cube);
        }

        function animateMenu() {
            if (gameStarted) return;
            requestAnimationFrame(animateMenu);

            if (Math.random() < 0.1) spawnMenuCube();

            for (let i = menuCubes.length - 1; i >= 0; i--) {
                let c = menuCubes[i];
                c.position.y += c.speedY;
                c.rotation.x += c.rotSpeed;
                c.rotation.y += c.rotSpeed;

                if (Math.random() < 0.4) {
                    const trailGeo = new THREE.BoxGeometry(c.scale.x * 0.5, c.scale.y * 0.5, c.scale.z * 0.5);
                    const trailMat = new THREE.MeshBasicMaterial({ color: 0x2ed573, transparent: true, opacity: 0.4 });
                    const tMesh = new THREE.Mesh(trailGeo, trailMat);
                    tMesh.position.copy(c.position);
                    menuScene.add(tMesh);
                    c.trails.push(tMesh);
                }

                for (let j = c.trails.length - 1; j >= 0; j--) {
                    let t = c.trails[j];
                    t.scale.multiplyScalar(0.92);
                    t.material.opacity -= 0.02;
                    if (t.material.opacity <= 0) {
                        menuScene.remove(t);
                        c.trails.splice(j, 1);
                    }
                }

                if (c.position.y > 10) {
                    c.trails.forEach(t => menuScene.remove(t));
                    menuScene.remove(c);
                    menuCubes.splice(i, 1);
                }
            }

            renderer.render(menuScene, menuCamera);
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0f19);
            scene.fog = new THREE.FogExp2(0x0b0f19, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 15);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            player = new THREE.Group();
            player.position.set(0, 2, 0);
            scene.add(player);
            player.add(camera);

            createPlatform(0, 0, 10, 0x2ed573);
            for(let i=1; i<15; i++) {
                createPlatform((Math.random()-0.5)*15, i*4, -i*8, 0xff4757);
            }

            setupControls();
            animateGame();
        }

        function createPlatform(x, y, z, color) {
            const geo = new THREE.BoxGeometry(5, 0.8, 5);
            const mat = new THREE.MeshPhongMaterial({color: color});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);
        }

        function setupControls() {
            const jZone = document.getElementById('joystickZone');
            const joy = document.getElementById('joystick');

            jZone.addEventListener('touchstart', e => {
                joyActive = true;
                joyStartX = e.touches[0].clientX;
                joyStartY = e.touches[0].clientY;
            });

            jZone.addEventListener('touchmove', e => {
                if(!joyActive) return;
                let dx = e.touches[0].clientX - joyStartX;
                let dy = e.touches[0].clientY - joyStartY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
                let angle = Math.atan2(dy, dx);
                
                let mx = Math.cos(angle) * dist;
                let my = Math.sin(angle) * dist;
                
                joy.style.transform = `translate(${mx}px, ${my}px)`;
                moveJoystick.x = mx / 35;
                moveJoystick.y = my / 35;
            });

            jZone.addEventListener('touchend', () => {
                joyActive = false;
                joy.style.transform = 'translate(0px, 0px)';
                moveJoystick = {x:0, y:0};
            });

            const jBtn = document.getElementById('jumpBtn');
            jBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                if(!isJumping) { yVelocity = jumpForce; isJumping = true; }
            });

            let touchStartX = 0, touchStartY = 0;
            window.addEventListener('touchstart', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                let dx = e.touches[0].clientX - touchStartX;
                let dy = e.touches[0].clientY - touchStartY;
                player.rotation.y -= dx * 0.005;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
        }

        function animateGame() {
            if (!gameStarted) return;
            requestAnimationFrame(animateGame);

            player.translateZ(moveJoystick.y * 0.1);
            player.translateX(moveJoystick.x * 0.1);

            yVelocity += gravity;
            player.position.y += yVelocity;

            blocks.forEach(b => {
                if(Math.abs(player.position.x - b.position.x) < 2.8 && 
                   Math.abs(player.position.z - b.position.z) < 2.8 && 
                   player.position.y - 1.6 <= b.position.y + 0.4 && 
                   player.position.y - 1.6 > b.position.y - 0.4 && yVelocity <= 0) {
                    player.position.y = b.position.y + 1.6;
                    yVelocity = 0;
                    isJumping = false;
                    if(b.scoreCounted === undefined && b.position.z !== 0) {
                        b.scoreCounted = true;
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            if(player.position.y < -15) {
                player.position.set(0, 2, 0);
                yVelocity = 0;
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            gameStarted = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('joystickZone').style.display = 'block';
            document.getElementById('jumpBtn').style.display = 'flex';
            
            menuCubes.forEach(c => {
                c.trails.forEach(t => menuScene.remove(t));
                menuScene.remove(c);
            });
            menuCubes = [];
            
            initGame();
        }

        window.onload = initMenuAnimation;
    </script>
</body>
    </html>
