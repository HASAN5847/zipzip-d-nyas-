<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZıpZıp Dünyası - Gündüz Şehri</title>
    <style>
        html, body { 
            margin: 0; 
            overflow: hidden; 
            background: #87CEEB; /* Açık mavi gökyüzü */
            font-family: sans-serif; 
            color: #fff; 
            user-select: none; 
            touch-action: none; 
            width: 100%;
            height: 100%;
        }
        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(135,206,235,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        #startScreen h1 { font-size: 65px; font-weight: 900; color: #fff; margin: 0; text-shadow: 0 4px 15px rgba(0,0,0,0.2); letter-spacing: 5px; }
        #startScreen p { font-size: 20px; color: #333; letter-spacing: 2px; margin-top: 10px; margin-bottom: 30px; font-weight: bold; }
        .btn { padding: 20px 60px; font-size: 26px; background: #ff4757; border: none; color: white; border-radius: 40px; cursor: pointer; font-weight: bold; box-shadow: 0 8px 25px rgba(255,71,87,0.5); }
        
        #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 5; background: rgba(0,0,0,0.6); padding: 10px 35px; border-radius: 20px; pointer-events: none; display: none; border: 2px solid #fff; }
        .stat { font-size: 26px; font-weight: bold; letter-spacing: 1px; color: #fff; }
        
        /* TUŞLARIN ARASI AÇILDI VE YERLERİ DÜZELTİLDİ */
        #joystickZone { position: absolute; bottom: 50px; left: 40px; width: 180px; height: 180px; background: rgba(255,255,255,0.3); border: 4px solid #fff; border-radius: 50%; z-index: 8; display: none; touch-action: none; }
        #joystick { position: absolute; width: 80px; height: 80px; background: #fff; border-radius: 50%; top: 50px; left: 50px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #jumpBtn { position: absolute; bottom: 50px; right: 40px; width: 140px; height: 140px; background: #2ed573; border: 4px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 28px; z-index: 8; box-shadow: 0 8px 20px rgba(0,0,0,0.3); display: none; touch-action: none; -webkit-user-select: none; color: white; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <h1>ZIPZIP DÜNYASI</h1>
        <p>GÜNDÜZ ŞEHRİ MODU</p>
        <button class="btn" onclick="startGame()">ŞEHRE GİR</button>
    </div>
    <div id="ui"><div class="stat">SKOR: <span id="score">0</span></div></div>
    <div id="joystickZone"><div id="joystick"></div></div>
    <div id="jumpBtn">ZIPLA</div>

    <script>
        let scene, camera, renderer, player, moveJoystick = {x:0, y:0}, yVelocity = 0;
        let blocks = [], score = 0, lastSpawnZ = 0;
        const gravity = -0.011; 
        const jumpForce = 0.32; 
        let joyStartX = 0, joyStartY = 0, joyActive = false;
        
        let menuCubes = [], gameStarted = false;
        let menuScene, menuCamera;

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });

        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            let now = (new Date()).getTime();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);

        function initMenuAnimation() {
            menuScene = new THREE.Scene();
            menuScene.background = new THREE.Color(0x87CEEB);
            menuCamera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            menuCamera.position.z = 15;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1.5);
            light.position.set(5, 5, 10);
            menuScene.add(light);

            animateMenu();
        }

        function spawnMenuCube() {
            if (gameStarted || menuCubes.length > 8) return;
            const geo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
            const mat = new THREE.MeshPhongMaterial({ color: 0xffffff });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.set((Math.random() - 0.5) * 20, -8, (Math.random() - 0.5) * 10);
            cube.speedY = 0.05 + Math.random() * 0.05;
            menuScene.add(cube);
            menuCubes.push(cube);
        }

        function animateMenu() {
            if (gameStarted) return;
            requestAnimationFrame(animateMenu);
            if (Math.random() < 0.05) spawnMenuCube();
            for (let i = menuCubes.length - 1; i >= 0; i--) {
                let c = menuCubes[i];
                c.position.y += c.speedY;
                if (c.position.y > 10) {
                    menuScene.remove(c);
                    menuCubes.splice(i, 1);
                }
            }
            renderer.render(menuScene, menuCamera);
        }

        function initGame() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Mavi Gökyüzü
            scene.fog = new THREE.FogExp2(0x87CEEB, 0.008); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

            // Güneşli Parlak Aydınlatma
            const sunLight = new THREE.DirectionalLight(0xffffff, 1.6);
            sunLight.position.set(40, 100, 20);
            scene.add(sunLight);
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); 
            scene.add(ambientLight);

            player = new THREE.Group();
            player.position.set(0, 26, 0); 
            scene.add(player);
            player.add(camera);

            // GÜNEŞ EKLEME (Sarı Küre)
            const sunGeo = new THREE.SphereGeometry(8, 32, 32);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
            const sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(30, 60, -100);
            scene.add(sun);

            // BULUTLARI ÜRETME
            for(let i=0; i<15; i++) {
                createCloud((Math.random() - 0.5) * 80, 40 + Math.random() * 15, -i * 30);
            }

            // Başlangıç binası (Gri Yapıldı)
            createBuilding(0, 0, 0, 16, 50, 25, 0x7f8c8d); 
            lastSpawnZ = -15;

            for(let i=0; i<25; i++) {
                generateNextBuildings();
            }

            setupControls();
            animateGame();
        }

        function createCloud(x, y, z) {
            const cloudGroup = new THREE.Group();
            const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, flatShading: true });
            
            const numBlobs = 3 + Math.floor(Math.random() * 3);
            for(let i=0; i<numBlobs; i++) {
                const blobGeo = new THREE.SphereGeometry(3 + Math.random() * 2, 8, 8);
                const blob = new THREE.Mesh(blobGeo, cloudMat);
                blob.position.set(i * 3, (Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2);
                cloudGroup.add(blob);
            }
            cloudGroup.position.set(x, y, z);
            scene.add(cloudGroup);
        }

        function createBuilding(x, y, z, w, h, d, color) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshPhongMaterial({ 
                color: color, 
                shininess: 20,
                flatShading: true
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);

            // Gerçekçi pencereler (Koyu Cam Tonları)
            const windowGeo = new THREE.BoxGeometry(0.6, 1.2, 0.1); 
            const windowMat = new THREE.MeshBasicMaterial({ color: 0x2c3e50 });
            
            for(let pz = z - d/2 + 2; pz < z + d/2 - 2; pz += 4) {
                for(let py = y - h/2 + 6; py < y + h/2 - 4; py += 6) {
                    if(Math.random() > 0.2) {
                        const winRight = new THREE.Mesh(windowGeo, windowMat);
                        winRight.position.set(x + w/2 + 0.05, py, pz);
                        winRight.rotation.y = Math.PI / 2;
                        scene.add(winRight);
                        mesh.add(winRight);

                        const winLeft = new THREE.Mesh(windowGeo, windowMat);
                        winLeft.position.set(x - w/2 - 0.05, py, pz);
                        winLeft.rotation.y = -Math.PI / 2;
                        scene.add(winLeft);
                        mesh.add(winLeft);
                    }
                }
            }

            mesh.topY = y + h/2;
            mesh.w = w;
            mesh.d = d;
        }

        function generateNextBuildings() {
            let zPos = lastSpawnZ - 24;
            let w = 10 + Math.random() * 6;
            let h = 40 + Math.random() * 30; 
            let d = 12 + Math.random() * 8;
            let xPos = (Math.random() - 0.5) * 14; 
            
            // Çeşitli gri tonları
            const grayTones = [0x95a5a6, 0x7f8c8d, 0xbdc3c7, 0x707a8a];
            let color = grayTones[Math.floor(Math.random() * grayTones.length)];

            createBuilding(xPos, h/2, zPos, w, h, d, color);
            
            // Aralardaki basma platformları (Hafif koyu gri yapıldı uyum için)
            if(Math.random() > 0.3) {
                createBuilding((Math.random() - 0.5) * 6, 20, zPos - 5, 6, 40, 6, 0x555d6b);
            }

            lastSpawnZ = zPos;
        }

        function setupControls() {
            const jZone = document.getElementById('joystickZone');
            const joy = document.getElementById('joystick');

            jZone.addEventListener('touchstart', e => {
                e.preventDefault();
                joyActive = true;
                joyStartX = e.touches[0].clientX;
                joyStartY = e.touches[0].clientY;
            }, { passive: false });

            jZone.addEventListener('touchmove', e => {
                e.preventDefault();
                if(!joyActive) return;
                let dx = e.touches[0].clientX - joyStartX;
                let dy = e.touches[0].clientY - joyStartY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                let angle = Math.atan2(dy, dx);
                
                let mx = Math.cos(angle) * dist;
                let my = Math.sin(angle) * dist;
                
                joy.style.transform = `translate(${mx}px, ${my}px)`;
                moveJoystick.x = mx / 50;
                moveJoystick.y = my / 50;
            }, { passive: false });

            jZone.addEventListener('touchend', e => {
                e.preventDefault();
                joyActive = false;
                joy.style.transform = 'translate(0px, 0px)';
                moveJoystick = {x:0, y:0};
            });

            // HAVADA SONSUZ ZIPLAMA
            const jBtn = document.getElementById('jumpBtn');
            jBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                yVelocity = jumpForce; 
            }, { passive: false });

            let touchStartX = 0, touchStartY = 0;
            window.addEventListener('touchstart', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                let dx = e.touches[0].clientX - touchStartX;
                let dy = e.touches[0].clientY - touchStartY;
                player.rotation.y -= dx * 0.006;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
        }

        function animateGame() {
            if (!gameStarted) return;
            requestAnimationFrame(animateGame);

            player.translateZ(moveJoystick.y * 0.22); 
            player.translateX(moveJoystick.x * 0.22);

            yVelocity += gravity;
            player.position.y += yVelocity;

            blocks.forEach(b => {
                if(Math.abs(player.position.x - b.position.x) < (b.w/2 + 0.6) && 
                   Math.abs(player.position.z - b.position.z) < (b.d/2 + 0.6) && 
                   player.position.y - 1.6 <= b.topY + 0.3 && 
                   player.position.y - 1.6 > b.topY - 1.2 && yVelocity <= 0) { 
                    player.position.y = b.topY + 1.6;
                    yVelocity = 0;
                    
                    if(b.scoreCounted === undefined && b.position.z !== 0) {
                        b.scoreCounted = true;
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            if (player.position.z < lastSpawnZ + 200) {
                generateNextBuildings();
            }

            if(player.position.y < -15) {
                player.position.set(0, 26, 0); 
                yVelocity = 0;
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            gameStarted = true;
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('ui').style.display = 'flex';
            document.getElementById('joystickZone').style.display = 'block';
            document.getElementById('jumpBtn').style.display = 'flex';
            
            menuCubes.forEach(c => menuScene.remove(c));
            menuCubes = [];
            
            initGame();
        }

        window.onload = initMenuAnimation;
    </script>
</body>
    </html>
