<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ZıpZıp Dünyası - FPS Modu</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0b0f19; font-family: sans-serif; color: #fff; user-select: none; }
        #startScreen { position: absolute; width: 100%; height: 100%; background: rgba(11,15,25,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; text-align: center; }
        .btn { padding: 15px 40px; font-size: 20px; background: #ff4757; border: none; color: white; border-radius: 30px; cursor: pointer; font-weight: bold; box-shadow: 0 5px 15px rgba(255,71,87,0.4); }
        #ui { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px 30px; border-radius: 20px; pointer-events: none; }
        .stat { font-size: 24px; font-weight: bold; }
        #joystickZone { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; z-index: 5; }
        #joystick { position: absolute; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; top: 35px; left: 35px; }
        #jumpBtn { position: absolute; bottom: 50px; right: 50px; width: 80px; height: 80px; background: rgba(255,71,87,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    <div id="startScreen">
        <h1>ZIPZIP DÜNYASI</h1>
        <p>FPS MODU - TELEFON İÇİN</p>
        <button class="btn" onclick="startGame()">OYUNA BAŞLA</button>
    </div>
    <div id="ui">
        <div class="stat">SKOR: <span id="score">0</span></div>
    </div>
    <div id="joystickZone"><div id="joystick"></div></div>
    <div id="jumpBtn">ZIPLA</div>

    <script>
        let scene, camera, renderer, player, moveJoystick = {x:0, y:0}, isJumping = false, yVelocity = 0;
        let blocks = [], score = 0;
        const gravity = -0.01, jumpForce = 0.22;
        let joyStartX = 0, joyStartY = 0, joyActive = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0b0f19);
            scene.fog = new THREE.FogExp2(0x0b0f19, 0.05);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ambient: true});
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 15);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            player = new THREE.Group();
            player.position.set(0, 2, 0);
            scene.add(player);
            player.add(camera);

            createPlatform(0, 0, 10, 0x2ed573);
            for(let i=1; i<15; i++) {
                createPlatform((Math.random()-0.5)*15, i*4, -i*8, 0xff4757);
            }

            setupControls();
            animate();
        }

        function createPlatform(x, y, z, color) {
            const geo = new THREE.BoxGeometry(5, 0.8, 5);
            const mat = new THREE.MeshPhongMaterial({color: color});
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            blocks.push(mesh);
        }

        function setupControls() {
            const jZone = document.getElementById('joystickZone');
            const joy = document.getElementById('joystick');

            jZone.addEventListener('touchstart', e => {
                joyActive = true;
                joyStartX = e.touches[0].clientX;
                joyStartY = e.touches[0].clientY;
            });

            jZone.addEventListener('touchmove', e => {
                if(!joyActive) return;
                let dx = e.touches[0].clientX - joyStartX;
                let dy = e.touches[0].clientY - joyStartY;
                let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 35);
                let angle = Math.atan2(dy, dx);
                
                let mx = Math.cos(angle) * dist;
                let my = Math.sin(angle) * dist;
                
                joy.style.transform = `translate(${mx}px, ${my}px)`;
                moveJoystick.x = mx / 35;
                moveJoystick.y = my / 35;
            });

            jZone.addEventListener('touchend', () => {
                joyActive = false;
                joy.style.transform = 'translate(0px, 0px)';
                moveJoystick = {x:0, y:0};
            });

            document.getElementById('jumpBtn').addEventListener('touchstart', () => {
                if(!isJumping) { yVelocity = jumpForce; isJumping = true; }
            });

            let touchStartX = 0, touchStartY = 0;
            window.addEventListener('touchstart', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });

            window.addEventListener('touchmove', e => {
                if(e.target.id === 'joystickZone' || e.target.id === 'joystick' || e.target.id === 'jumpBtn') return;
                let dx = e.touches[0].clientX - touchStartX;
                let dy = e.touches[0].clientY - touchStartY;
                player.rotation.y -= dx * 0.005;
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
            });
        }

        function animate() {
            requestAnimationFrame(animate);

            player.translateZ(moveJoystick.y * 0.1);
            player.translateX(moveJoystick.x * 0.1);

            yVelocity += gravity;
            player.position.y += yVelocity;

            let onGround = false;
            blocks.forEach(b => {
                if(Math.abs(player.position.x - b.position.x) < 2.8 && 
                   Math.abs(player.position.z - b.position.z) < 2.8 && 
                   player.position.y - 1.6 <= b.position.y + 0.4 && 
                   player.position.y - 1.6 > b.position.y - 0.4 && yVelocity <= 0) {
                    player.position.y = b.position.y + 1.6;
                    yVelocity = 0;
                    isJumping = false;
                    onGround = true;
                    if(b.scoreCounted === undefined && b.position.z !== 0) {
                        b.scoreCounted = true;
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            });

            if(player.position.y < -15) {
                player.position.set(0, 2, 0);
                yVelocity = 0;
            }

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            init();
        }
    </script>
</body>
</html>
