<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grafiti Kaçışı</title>
<style>
body{
margin:0;
overflow:hidden;
background:#222;
}
#game{
background:#444;
display:block;
margin:auto;
}
#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
font-family:Arial;
}
</style>
</head>
<body>

<div id="score">Skor: 0</div>

<canvas id="game" width="400" height="700"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let lane = 1;
let score = 0;
let gameOver = false;

const lanes = [80, 200, 320];

const player = {
x: lanes[1],
y: 580,
w: 40,
h: 60,
vy: 0,
jumping:false
};

const police = {
x: lanes[1],
y: 650,
w: 40,
h: 50
};

let obstacles = [];

function spawnObstacle(){
obstacles.push({
lane: Math.floor(Math.random()*3),
y: -100,
w: 50,
h: 80
});
}

setInterval(()=>{
if(!gameOver) spawnObstacle();
},1000);

document.addEventListener("keydown",(e)=>{

if(e.key==="ArrowLeft"){
lane=Math.max(0,lane-1);
}

if(e.key==="ArrowRight"){
lane=Math.min(2,lane+1);
}

if(e.key==="ArrowUp" && !player.jumping){
player.vy=-15;
player.jumping=true;
}

});

function update(){

if(gameOver) return;

score++;

document.getElementById("score").innerText =
"Skor: "+score;

player.x = lanes[lane];

player.vy += 0.8;
player.y += player.vy;

if(player.y>580){
player.y=580;
player.vy=0;
player.jumping=false;
}

for(let o of obstacles){

o.y += 8;

if(
player.x-player.w/2 < lanes[o.lane]+o.w/2 &&
player.x+player.w/2 > lanes[o.lane]-o.w/2 &&
player.y < o.y+o.h &&
player.y+player.h > o.y
){
gameOver=true;
alert("Polis seni yakaladı! Skor: "+score);
}

}

obstacles = obstacles.filter(o=>o.y<800);

}

function draw(){

ctx.clearRect(0,0,400,700);

ctx.fillStyle="#555";
ctx.fillRect(50,0,300,700);

ctx.strokeStyle="white";

ctx.beginPath();
ctx.moveTo(150,0);
ctx.lineTo(150,700);
ctx.stroke();

ctx.beginPath();
ctx.moveTo(250,0);
ctx.lineTo(250,700);
ctx.stroke();

ctx.fillStyle="blue";
ctx.fillRect(
player.x-20,
player.y,
player.w,
player.h
);

ctx.fillStyle="green";
ctx.fillRect(
police.x-20,
police.y,
police.w,
police.h
);

ctx.fillStyle="red";

for(let o of obstacles){
ctx.fillRect(
lanes[o.lane]-25,
o.y,
o.w,
o.h
);
}

}

function gameLoop(){

update();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
